name: ci

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  # JOB 1: Análisis SAST con Bandit
  bandit_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar Bandit con soporte SARIF
        run: pip install bandit[sarif]
        
      - name: Ejecutar Bandit Scan
        # -ll omite severity low, -ii omite confidence low. || true evita que el pipeline falle si encuentra fallos
        run: bandit -r . -f sarif -o sast-bandit.sarif -ll -ii || true
        
      - name: Subir artefacto Bandit
        uses: actions/upload-artifact@v4
        with:
          name: sast-bandit-results
          path: sast-bandit.sarif
          
      - name: Subir SARIF a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast-bandit.sarif

  # JOB 2: Análisis SAST con Semgrep (En paralelo)
  semgrep_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        
      - name: Ejecutar Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
          generateSarif: "1"
        env:
          # Esto genera el archivo SARIF llamado semgrep.sarif
          SEMGREP_RULES: p/default
          
      - name: Subir artefacto Semgrep
        uses: actions/upload-artifact@v4
        with:
          name: sast-semgrep-results
          path: semgrep.sarif
          
      - name: Subir SARIF a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  # JOB 3: Construcción y Análisis Docker con Docker Scout
  docker_build_and_scan:
    runs-on: ubuntu-latest
    needs: [bandit_scan, semgrep_scan] # Se ejecuta después de los SAST
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        
      - name: Construir imagen Docker
        run: docker build -t pygoat-app:latest .
        
      - name: Analizar imagen con Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: pygoat-app:latest
          only-severities: critical,high
